services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: dingwei_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://crm:crm_password@postgres:5432/dingwei_crm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me
      DEEPSEEK_API_KEY: change_me
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
